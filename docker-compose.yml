version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./backend:/app
      - ./image data:/app/../image data
      - ./autism_question_bot_data.txt:/app/../autism_question_bot_data.txt
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - FASTAPI_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_db: